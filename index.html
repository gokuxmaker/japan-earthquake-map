<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=800"/>
<title>Japan Earthquake Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:800px;height:480px;overflow:hidden;background:#fff;font-family:'Exo 2',sans-serif;color:#000}
.page{width:800px;height:480px;display:grid;grid-template-columns:320px 1fr;border:4px solid #000}

/* MAP */
.map-panel{border-right:3px solid #000;display:flex;flex-direction:column;background:#fff}
.map-header{background:#000;color:#fff;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.map-title{font-family:'Orbitron',monospace;font-size:12px;font-weight:900;letter-spacing:2px}
.map-time{font-size:11px;font-weight:800;color:#ccc}
.map-wrap{flex:1;position:relative;overflow:hidden;background:#fff}
#japan-svg{width:100%;height:100%}
.map-footer{padding:5px 10px;border-top:2.5px solid #000;font-size:12px;font-weight:900;flex-shrink:0;background:#fff;display:flex;gap:16px;align-items:center}

/* DATA */
.data-panel{background:#fff;display:flex;flex-direction:column}
.data-header{background:#000;color:#fff;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.monitor-label{font-family:'Orbitron',monospace;font-size:11px;font-weight:900;letter-spacing:3px}
.live-badge{font-family:'Orbitron',monospace;font-size:11px;font-weight:900;display:flex;align-items:center;gap:6px}
.live-dot{width:10px;height:10px;border-radius:50%;background:#fff;border:2px solid #888}
.main-quake{padding:10px 14px;border-bottom:3px solid #000;flex-shrink:0}
.mag-row{display:flex;align-items:baseline;gap:8px;margin-bottom:3px}
.mag-label{font-size:12px;font-weight:900;letter-spacing:2px;text-transform:uppercase}
.mag-value{font-family:'Orbitron',monospace;font-size:54px;font-weight:900;line-height:1}
.mag-unit{font-family:'Orbitron',monospace;font-size:16px;font-weight:900}
.quake-location{font-size:16px;font-weight:900;margin-bottom:3px;line-height:1.25}
.quake-meta{display:flex;gap:14px}
.quake-time,.quake-depth{font-size:13px;font-weight:900}
.scale-section{padding:8px 14px;border-bottom:3px solid #000;flex-shrink:0}
.section-label{font-size:10px;font-weight:900;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px}
.scale-bar{display:flex;height:20px;border:2.5px solid #000;border-radius:2px;overflow:hidden}
.scale-seg{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;flex:1}
.recent-section{flex:1;display:flex;flex-direction:column;overflow:hidden}
.recent-label{padding:7px 14px 5px;font-size:10px;font-weight:900;letter-spacing:3px;text-transform:uppercase;border-bottom:2px solid #000;flex-shrink:0}
.quake-list{flex:1;display:flex;flex-direction:column;justify-content:space-between;padding:5px 14px 8px}
.q-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1.5px solid #ccc}
.q-row:last-child{border-bottom:none}
.q-mag{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;width:46px;flex-shrink:0}
.q-info{flex:1}
.q-loc{font-size:13px;font-weight:900;line-height:1.2}
.q-sub{font-size:11px;font-weight:800;color:#333;display:flex;gap:10px}
.q-mbar{width:56px;flex-shrink:0}
.q-mbar-track{height:10px;border:2px solid #000;border-radius:2px;overflow:hidden;background:#eee}
.q-mbar-fill{height:100%;background:#000}
.no-data{padding:20px;font-size:15px;font-weight:900;color:#555;text-align:center}
</style>
</head>
<body>
<div class="page">

  <!-- LEFT: MAP -->
  <div class="map-panel">
    <div class="map-header">
      <span class="map-title">JAPAN SEISMIC MAP</span>
      <span class="map-time" id="map-time">—</span>
    </div>
    <div class="map-wrap">
      <!--
        Japan SVG outline only — no fill, just strokes.
        ViewBox tuned so Japan fills the panel nicely.
        Geo bounds: lat 24–46, lon 122–146
        SVG coords: x=lon mapped 0→310, y=lat mapped (inverted) 0→410
        Formula: x=(lon-122)/(146-122)*310  y=(46-lat)/(46-24)*410
      -->
      <svg id="japan-svg" viewBox="0 0 310 410" xmlns="http://www.w3.org/2000/svg">
        <rect width="310" height="410" fill="#fff"/>

        <!-- ── HOKKAIDO ── -->
        <path fill="none" stroke="#000" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"
          d="M232,28 L238,24 L246,22 L254,23 L260,27 L265,33 L267,40 L264,47 L258,52
             L253,55 L246,56 L240,54 L234,50 L229,44 L228,37 Z
             M220,52 L226,48 L234,50 L240,54 L244,60 L246,67 L244,74 L239,79 L232,82
             L225,81 L218,76 L215,69 L215,62 Z"/>

        <!-- ── HONSHU (main island) ── -->
        <path fill="none" stroke="#000" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"
          d="M218,76 L224,81 L232,82 L238,86 L242,93 L243,101 L240,109
             L234,116 L226,121 L218,124 L210,126 L202,127 L194,126
             L186,124 L179,120 L173,114 L168,107 L165,99 L164,91
             L166,83 L171,76 L178,70 L185,66 L193,63 L200,62
             L208,63 L215,67 Z
             M164,91 L160,98 L156,106 L151,113 L145,119 L138,124
             L131,127 L123,128 L115,127 L107,124 L100,119 L94,113
             L90,106 L88,98 L88,90 L90,82 L95,75 L101,69
             L108,64 L116,61 L124,60 L132,61 L139,64
             L145,69 L150,75 L155,82 L158,89 Z
             M88,90 L84,98 L80,106 L77,115 L76,124 L77,133
             L80,141 L85,149 L91,156 L98,161 L106,165
             L113,167 L121,167 L128,165 L135,161 L140,156
             L144,149 L147,141 L148,132 L147,123 L144,115
             L140,107 L135,101"/>

        <!-- ── KYUSHU ── -->
        <path fill="none" stroke="#000" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"
          d="M76,200 L82,196 L89,194 L97,195 L104,199 L109,205
             L111,213 L109,220 L104,226 L97,230 L89,231
             L81,228 L75,222 L72,214 L73,207 Z"/>

        <!-- ── SHIKOKU ── -->
        <path fill="none" stroke="#000" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"
          d="M100,172 L108,169 L117,168 L126,170 L133,175
             L137,182 L136,190 L130,196 L122,199
             L113,198 L105,194 L100,187 L98,179 Z"/>

        <!-- ── OKINAWA (small island chain, simplified) ── -->
        <path fill="none" stroke="#000" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"
          d="M40,340 L46,338 L50,340 L48,344 L43,345 Z
             M55,330 L59,328 L62,330 L60,334 Z"/>

        <!-- city label dots -->
        <circle cx="183" cy="120" r="3" fill="#000"/>
        <text x="187" y="118" font-size="10" font-weight="900" font-family="Exo 2,sans-serif" fill="#000">Tokyo</text>
        <circle cx="148" cy="149" r="2.5" fill="#555"/>
        <text x="152" y="147" font-size="9" font-weight="800" font-family="Exo 2,sans-serif" fill="#555">Osaka</text>
        <circle cx="90" cy="215" r="2.5" fill="#555"/>
        <text x="94" y="213" font-size="9" font-weight="800" font-family="Exo 2,sans-serif" fill="#555">Fukuoka</text>
        <circle cx="246" cy="38" r="2.5" fill="#555"/>
        <text x="250" y="36" font-size="9" font-weight="800" font-family="Exo 2,sans-serif" fill="#555">Sapporo</text>

        <!-- epicentre group — JS sets cx/cy and r -->
        <circle id="epi-outer" cx="-999" cy="-999" r="8" fill="none" stroke="#000" stroke-width="2.5" stroke-dasharray="5,3"/>
        <circle id="epi-mid"   cx="-999" cy="-999" r="0" fill="none" stroke="#000" stroke-width="2.5"/>
        <circle id="epi-dot"   cx="-999" cy="-999" r="4" fill="#000"/>
        <line   id="epi-h1"    x1="-999" y1="-999" x2="-999" y2="-999" stroke="#000" stroke-width="2.5"/>
        <line   id="epi-h2"    x1="-999" y1="-999" x2="-999" y2="-999" stroke="#000" stroke-width="2.5"/>
        <line   id="epi-v1"    x1="-999" y1="-999" x2="-999" y2="-999" stroke="#000" stroke-width="2.5"/>
        <line   id="epi-v2"    x1="-999" y1="-999" x2="-999" y2="-999" stroke="#000" stroke-width="2.5"/>
      </svg>
    </div>
    <div class="map-footer">
      <span>⊕ Epicentre (scaled to magnitude)</span>
    </div>
  </div>

  <!-- RIGHT: DATA -->
  <div class="data-panel">
    <div class="data-header">
      <span class="monitor-label">EARTHQUAKE MONITOR</span>
      <span class="live-badge"><div class="live-dot"></div>LIVE</span>
    </div>
    <div class="main-quake">
      <div class="mag-row">
        <span class="mag-label">Magnitude</span>
        <span class="mag-value" id="main-mag">—</span>
        <span class="mag-unit">M</span>
      </div>
      <div class="quake-location" id="main-loc">Loading data...</div>
      <div class="quake-meta">
        <span class="quake-time" id="main-time"></span>
        <span class="quake-depth" id="main-depth"></span>
      </div>
    </div>
    <div class="scale-section">
      <div class="section-label">Magnitude Scale Reference</div>
      <div class="scale-bar">
        <div class="scale-seg" style="background:#aaa">M1</div>
        <div class="scale-seg" style="background:#888">M2</div>
        <div class="scale-seg" style="background:#666">M3</div>
        <div class="scale-seg" style="background:#444">M4</div>
        <div class="scale-seg" style="background:#222">M5</div>
        <div class="scale-seg" style="background:#000">M6+</div>
      </div>
    </div>
    <div class="recent-section">
      <div class="recent-label">Recent Earthquakes — Japan Region</div>
      <div class="quake-list" id="quake-list"><div class="no-data">Fetching...</div></div>
    </div>
  </div>
</div>

<script>
// Geo bounds → SVG viewBox 0 0 310 410
const GEO={minLat:24,maxLat:46,minLon:122,maxLon:146};
function toSVG(lat,lon){
  return{
    x:(lon-GEO.minLon)/(GEO.maxLon-GEO.minLon)*310,
    y:(GEO.maxLat-lat)/(GEO.maxLat-GEO.minLat)*410
  };
}

function ago(ms){
  const s=(Date.now()-ms)/1000;
  if(s<60)return Math.round(s)+'s ago';
  if(s<3600)return Math.round(s/60)+'m ago';
  if(s<86400)return Math.round(s/3600)+'h ago';
  return Math.round(s/86400)+'d ago';
}

function grey(m){
  if(m<2)return'#aaa';if(m<3)return'#888';if(m<4)return'#666';
  if(m<5)return'#444';if(m<6)return'#222';return'#000';
}

// Radius scales with magnitude: M1→6px, M3→12px, M5→22px, M7→40px
function magRadius(m){
  return Math.max(6, Math.round(4 * Math.pow(m, 1.4)));
}

function placeEpicentre(lat, lon, mag) {
  const {x, y} = toSVG(lat, lon);
  const r = magRadius(mag);
  const gap = 5; // gap between crosshair line end and circle edge

  // outer dashed ring — scales with magnitude
  const outer = document.getElementById('epi-outer');
  outer.setAttribute('cx', x); outer.setAttribute('cy', y);
  outer.setAttribute('r', r);

  // solid inner circle (smaller)
  const mid = document.getElementById('epi-mid');
  mid.setAttribute('cx', x); mid.setAttribute('cy', y);
  mid.setAttribute('r', Math.max(3, r * 0.45));

  // dot
  const dot = document.getElementById('epi-dot');
  dot.setAttribute('cx', x); dot.setAttribute('cy', y);
  dot.setAttribute('r', Math.max(3, r * 0.18));

  // crosshair lines — gap around the outer ring
  const arm = r + gap + 10;
  document.getElementById('epi-h1').setAttribute('x1', x - arm); document.getElementById('epi-h1').setAttribute('y1', y);
  document.getElementById('epi-h1').setAttribute('x2', x - r - gap); document.getElementById('epi-h1').setAttribute('y2', y);
  document.getElementById('epi-h2').setAttribute('x1', x + r + gap); document.getElementById('epi-h2').setAttribute('y1', y);
  document.getElementById('epi-h2').setAttribute('x2', x + arm); document.getElementById('epi-h2').setAttribute('y2', y);
  document.getElementById('epi-v1').setAttribute('x1', x); document.getElementById('epi-v1').setAttribute('y1', y - arm);
  document.getElementById('epi-v1').setAttribute('x2', x); document.getElementById('epi-v1').setAttribute('y2', y - r - gap);
  document.getElementById('epi-v2').setAttribute('x1', x); document.getElementById('epi-v2').setAttribute('y1', y + r + gap);
  document.getElementById('epi-v2').setAttribute('x2', x); document.getElementById('epi-v2').setAttribute('y2', y + arm);
}

async function load(){
  try{
    const res = await fetch('https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&minlatitude=24&maxlatitude=46&minlongitude=122&maxlongitude=146&minmagnitude=1.5&orderby=time&limit=9');
    const data = await res.json();
    const qs = data.features || [];

    if(!qs.length){
      document.getElementById('main-loc').textContent='No recent earthquakes';
      document.getElementById('quake-list').innerHTML='<div class="no-data">No data available.</div>';
      return;
    }

    const t = qs[0];
    const mag = parseFloat(t.properties.mag);
    const lon = t.geometry.coordinates[0];
    const lat = t.geometry.coordinates[1];
    const dep = parseFloat(t.geometry.coordinates[2]).toFixed(0);

    document.getElementById('main-mag').textContent = mag.toFixed(1);
    document.getElementById('main-loc').textContent = t.properties.place || 'Japan Region';
    document.getElementById('main-time').textContent = ago(t.properties.time);
    document.getElementById('main-depth').textContent = 'Depth: ' + dep + ' km';
    document.getElementById('map-time').textContent = new Date(t.properties.time).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});

    placeEpicentre(lat, lon, mag);

    const recent = qs.slice(1, 6);
    document.getElementById('quake-list').innerHTML = recent.map(q => {
      const m = parseFloat(q.properties.mag);
      const pct = Math.min(100,(m/8)*100);
      const c = grey(m);
      const d2 = parseFloat(q.geometry.coordinates[2]).toFixed(0);
      return '<div class="q-row">'
        +'<div class="q-mag" style="color:'+c+'">'+m.toFixed(1)+'</div>'
        +'<div class="q-info">'
          +'<div class="q-loc">'+(q.properties.place||'Japan Region')+'</div>'
          +'<div class="q-sub"><span>'+ago(q.properties.time)+'</span><span>Depth: '+d2+' km</span></div>'
        +'</div>'
        +'<div class="q-mbar"><div class="q-mbar-track"><div class="q-mbar-fill" style="width:'+pct+'%;background:'+c+'"></div></div></div>'
      +'</div>';
    }).join('');

  }catch(e){
    document.getElementById('main-loc').textContent='Connection error';
    document.getElementById('quake-list').innerHTML='<div class="no-data">Could not load data.</div>';
  }
}
load();
</script>
</body>
</html>
