<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=800"/>
<title>Japan Earthquake Monitor</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:800px;height:480px;overflow:hidden;background:#fff;font-family:'Exo 2',sans-serif;color:#000}

/* page hidden until JS reveals it */
.page{
  width:800px;height:480px;
  display:grid;grid-template-columns:340px 1fr;
  border:4px solid #000;
  visibility:hidden;
}
.page.ready{visibility:visible}

.map-panel{border-right:3px solid #000;display:flex;flex-direction:column;background:#fff}
.map-header{background:#000;color:#fff;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.map-title{font-family:'Orbitron',monospace;font-size:12px;font-weight:900;letter-spacing:2px}
.map-time{font-size:11px;font-weight:800;color:#ccc}
#map{flex:1;min-height:0}
.map-footer{padding:5px 10px;border-top:2.5px solid #000;font-size:12px;font-weight:900;flex-shrink:0;background:#fff;display:flex;gap:12px;align-items:center}
.leaflet-tile{filter:grayscale(100%) contrast(1.15) brightness(1.05) !important}
.leaflet-control-zoom,.leaflet-control-attribution{display:none !important}

.data-panel{background:#fff;display:flex;flex-direction:column}
.data-header{background:#000;color:#fff;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.monitor-label{font-family:'Orbitron',monospace;font-size:11px;font-weight:900;letter-spacing:3px}
.live-badge{font-family:'Orbitron',monospace;font-size:11px;font-weight:900;display:flex;align-items:center;gap:6px}
.live-dot{width:10px;height:10px;border-radius:50%;background:#fff;border:2px solid #888}
.main-quake{padding:10px 14px;border-bottom:3px solid #000;flex-shrink:0}
.mag-row{display:flex;align-items:baseline;gap:8px;margin-bottom:3px}
.mag-label{font-size:12px;font-weight:900;letter-spacing:2px;text-transform:uppercase}
.mag-value{font-family:'Orbitron',monospace;font-size:52px;font-weight:900;line-height:1}
.mag-unit{font-family:'Orbitron',monospace;font-size:16px;font-weight:900}
.quake-location{font-size:15px;font-weight:900;margin-bottom:3px;line-height:1.25}
.quake-meta{display:flex;gap:14px}
.quake-time,.quake-depth{font-size:13px;font-weight:900}
.scale-section{padding:7px 14px;border-bottom:3px solid #000;flex-shrink:0}
.section-label{font-size:10px;font-weight:900;letter-spacing:3px;text-transform:uppercase;margin-bottom:5px}
.scale-bar{display:flex;height:18px;border:2.5px solid #000;border-radius:2px;overflow:hidden}
.scale-seg{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;flex:1}
.recent-section{flex:1;display:flex;flex-direction:column;overflow:hidden}
.recent-label{padding:6px 14px 4px;font-size:10px;font-weight:900;letter-spacing:3px;text-transform:uppercase;border-bottom:2px solid #000;flex-shrink:0}
.quake-list{flex:1;display:flex;flex-direction:column;justify-content:space-between;padding:4px 14px 8px}
.q-row{display:flex;align-items:center;gap:8px;padding:3px 0;border-bottom:1.5px solid #ccc}
.q-row:last-child{border-bottom:none}
.q-num{font-family:'Orbitron',monospace;font-size:12px;font-weight:900;width:18px;flex-shrink:0}
.q-mag{font-family:'Orbitron',monospace;font-size:19px;font-weight:900;width:42px;flex-shrink:0}
.q-info{flex:1}
.q-loc{font-size:12px;font-weight:900;line-height:1.2}
.q-sub{font-size:11px;font-weight:800;color:#333;display:flex;gap:10px}
.q-mbar{width:50px;flex-shrink:0}
.q-mbar-track{height:10px;border:2px solid #000;border-radius:2px;overflow:hidden;background:#eee}
.q-mbar-fill{height:100%;background:#000}
</style>
</head>
<body>
<div class="page" id="page">
  <div class="map-panel">
    <div class="map-header">
      <span class="map-title">JAPAN SEISMIC MAP</span>
      <span class="map-time" id="map-time">—</span>
    </div>
    <div id="map"></div>
    <div class="map-footer">● Dot size = magnitude &nbsp;|&nbsp; <span style="font-size:10px;font-weight:800">© OpenStreetMap</span></div>
  </div>
  <div class="data-panel">
    <div class="data-header">
      <span class="monitor-label">EARTHQUAKE MONITOR</span>
      <span class="live-badge"><div class="live-dot"></div>LIVE</span>
    </div>
    <div class="main-quake">
      <div class="mag-row">
        <span class="mag-label">Magnitude</span>
        <span class="mag-value" id="main-mag"></span>
        <span class="mag-unit">M</span>
      </div>
      <div class="quake-location" id="main-loc"></div>
      <div class="quake-meta">
        <span class="quake-time" id="main-time"></span>
        <span class="quake-depth" id="main-depth"></span>
      </div>
    </div>
    <div class="scale-section">
      <div class="section-label">Magnitude Scale Reference</div>
      <div class="scale-bar">
        <div class="scale-seg" style="background:#aaa">M1</div>
        <div class="scale-seg" style="background:#888">M2</div>
        <div class="scale-seg" style="background:#666">M3</div>
        <div class="scale-seg" style="background:#444">M4</div>
        <div class="scale-seg" style="background:#222">M5</div>
        <div class="scale-seg" style="background:#000">M6+</div>
      </div>
    </div>
    <div class="recent-section">
      <div class="recent-label">Recent Earthquakes — Japan Region</div>
      <div class="quake-list" id="quake-list"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
function ago(ms){
  const s=(Date.now()-ms)/1000;
  if(s<60)return Math.round(s)+'s ago';
  if(s<3600)return Math.round(s/60)+'m ago';
  if(s<86400)return Math.round(s/3600)+'h ago';
  return Math.round(s/86400)+'d ago';
}
function magM(m){return Math.max(8000,Math.round(3500*Math.pow(m,1.8)));}

async function init(){
  // fetch data and init map in parallel
  const [dataResult] = await Promise.all([
    fetch('https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&minlatitude=24&maxlatitude=46&minlongitude=122&maxlongitude=146&minmagnitude=1.5&orderby=time&limit=6')
      .then(r=>r.json()).catch(()=>({features:[]}))
  ]);

  const qs = dataResult.features || [];

  // init map
  const map = L.map('map',{
    center:[35.5,136.0],zoom:4,
    zoomControl:false,attributionControl:false,
    scrollWheelZoom:false,dragging:false,
    doubleClickZoom:false,touchZoom:false
  });

  const tiles = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19,crossOrigin:true
  }).addTo(map);

  // fill all DOM immediately
  if(qs.length){
    qs.forEach((q,i)=>{
      L.circle([q.geometry.coordinates[1],q.geometry.coordinates[0]],{
        radius:magM(parseFloat(q.properties.mag)),
        color:'#000',weight:i===0?3:2,
        fillColor:'#000',fillOpacity:i===0?0.85:0.45
      }).addTo(map);
    });

    const t=qs[0], mag=parseFloat(t.properties.mag), dep=parseFloat(t.geometry.coordinates[2]).toFixed(0);
    document.getElementById('main-mag').textContent=mag.toFixed(1);
    document.getElementById('main-loc').textContent=t.properties.place||'Japan Region';
    document.getElementById('main-time').textContent=ago(t.properties.time);
    document.getElementById('main-depth').textContent='Depth: '+dep+' km';
    document.getElementById('map-time').textContent=new Date(t.properties.time)
      .toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});

    document.getElementById('quake-list').innerHTML=qs.map((q,i)=>{
      const m=parseFloat(q.properties.mag),pct=Math.min(100,(m/8)*100),d=parseFloat(q.geometry.coordinates[2]).toFixed(0);
      return '<div class="q-row">'
        +'<div class="q-num">'+(i+1)+'</div>'
        +'<div class="q-mag">'+m.toFixed(1)+'</div>'
        +'<div class="q-info">'
          +'<div class="q-loc">'+(q.properties.place||'Japan Region')+'</div>'
          +'<div class="q-sub"><span>'+ago(q.properties.time)+'</span><span>'+d+' km deep</span></div>'
        +'</div>'
        +'<div class="q-mbar"><div class="q-mbar-track"><div class="q-mbar-fill" style="width:'+pct+'%"></div></div></div>'
      +'</div>';
    }).join('');
  } else {
    document.getElementById('main-loc').textContent='No recent earthquakes';
  }

  // wait for tiles then reveal everything at once
  tiles.once('load', ()=>{
    document.getElementById('page').classList.add('ready');
  });
  // fallback — show after 5s even if tiles are slow
  setTimeout(()=>document.getElementById('page').classList.add('ready'), 5000);
}

init();
</script>
</body>
</html>
